<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a6fd8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a3a6a" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#2a5bb5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGrad)" />
  <circle cx="100" cy="100" r="92" fill="none" stroke="#6aa0ff" stroke-width="1.5" opacity="0.4" />

  <!-- Envelope Body -->
  <rect x="40" y="65" width="120" height="85" rx="8" ry="8" fill="url(#envGrad)" filter="url(#shadow)" />

  <!-- Envelope flap (top triangle) -->
  <path d="M40,73 L100,118 L160,73" fill="none" stroke="#c0d4f5" stroke-width="2" stroke-linejoin="round" />

  <!-- Envelope bottom fold lines -->
  <path d="M40,150 L80,118" fill="none" stroke="#d8e4f5" stroke-width="1.2" opacity="0.5" />
  <path d="M160,150 L120,118" fill="none" stroke="#d8e4f5" stroke-width="1.2" opacity="0.5" />

  <!-- @ Symbol -->
  <circle cx="100" cy="105" r="18" fill="none" stroke="#4f8cff" stroke-width="4.5" />
  <path d="M112,98 A8,8 0 1,0 112,112" fill="none" stroke="#4f8cff" stroke-width="4.5" stroke-linecap="round" />
  <circle cx="100" cy="105" r="8" fill="none" stroke="#4f8cff" stroke-width="4" />

  <!-- Small decorative dot -->
  <circle cx="148" cy="76" r="3.5" fill="#ffcc4d" opacity="0.9" />
</svg>
